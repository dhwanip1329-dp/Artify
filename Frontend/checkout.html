<!DOCTYPE html>
<html>
<head>
  <title>Checkout - ARTIFY</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="logo">ARTIFY</div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>

    <a href="upload.html" id="uploadLink">Upload</a>

    <a href="cart.html" class="cart-link">
      🛒 Cart (<span id="cartCount">0</span>)
    </a>

    <a href="register.html" id="registerLink">Register</a>
    <a href="login.html" id="loginLink">Login</a>
    <a href="#" id="logoutLink" onclick="logout()">Logout</a>
  </div>
</nav>


<section class="checkout-section">
  <div class="checkout-container">

    <h2>Checkout</h2>

    <div id="orderSummary"></div>

    <form onsubmit="placeOrder(event)">
      <input type="text" id="customerName" placeholder="Full Name" required>
      <input type="email" id="customerEmail" placeholder="Email" required>
      <input type="text" id="customerAddress" placeholder="Address" required>

      <button type="submit" class="hero-btn">Place Order</button>
    </form>

  </div>
</section>

<script src="js/main.js"></script>
</body>
</html>
