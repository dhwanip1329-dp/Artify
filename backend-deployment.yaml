apiVersion: apps/v1
kind: Deployment
metadata:
  name: artify-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: artify-sa   # 🔥 IMPORTANT (IAM role connection)
      containers:
        - name: backend
          image: 660035875440.dkr.ecr.ap-south-1.amazonaws.com/artify-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000