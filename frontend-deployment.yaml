apiVersion: apps/v1
kind: Deployment
metadata:
  name: artify-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: artify-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000